<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply — {{ job_title }}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f4f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            max-width: 560px;
            width: 100%;
            overflow: hidden;
        }

        .card-header {
            background: linear-gradient(135deg, #1a7bf2, #0d5ec7);
            color: white;
            padding: 28px 36px;
        }

        .card-header p {
            font-size: 12px;
            opacity: 0.8;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .card-header h2 {
            font-size: 22px;
            font-weight: 700;
        }

        .card-body { padding: 36px; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            margin-bottom: 6px;
        }

        input[type="text"],
        input[type="email"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            color: #111;
            transition: border 0.2s;
            outline: none;
        }

        input:focus { border-color: #1a7bf2; }

        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 10px;
            padding: 32px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .upload-area:hover, .upload-area.dragover {
            border-color: #1a7bf2;
            background: #f0f7ff;
        }

        .upload-area .icon { font-size: 32px; margin-bottom: 8px; }
        .upload-area p { font-size: 14px; color: #6b7280; }
        .upload-area span { font-size: 12px; color: #9ca3af; }

        #fileInput { display: none; }

        .file-selected {
            display: none;
            align-items: center;
            gap: 10px;
            padding: 12px 14px;
            background: #e8f5e9;
            border-radius: 8px;
            font-size: 13px;
            color: #2e7d32;
            margin-top: 10px;
            font-weight: 500;
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1a7bf2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }

        .btn-submit:hover { background: #0d5ec7; }
        .btn-submit:disabled { background: #9ca3af; cursor: not-allowed; }

        .success-box {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .success-box .icon { font-size: 56px; margin-bottom: 16px; }
        .success-box h3 { font-size: 22px; color: #10b981; margin-bottom: 8px; }
        .success-box p { font-size: 14px; color: #6b7280; line-height: 1.6; }

        .error-msg {
            display: none;
            padding: 12px 14px;
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            border-radius: 6px;
            font-size: 13px;
            color: #b91c1c;
            margin-bottom: 16px;
        }

        .loading { display: none; text-align: center; padding: 12px; color: #6b7280; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="card-header">
        <p>📋 Applying for</p>
        <h2>{{ job_title }}</h2>
    </div>

    <div class="card-body">

        <!-- Error message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Application Form -->
        <div id="applicationForm">
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="candidateName" placeholder="e.g. Anusree K P" required>
            </div>

            <div class="form-group">
                <label>Email Address *</label>
                <input type="email" id="candidateEmail" placeholder="e.g. anusree@gmail.com" required>
            </div>

            <div class="form-group">
                <label>Resume (PDF or DOCX) *</label>
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <div class="icon">📄</div>
                    <p>Click to upload or drag & drop</p>
                    <span>PDF or DOCX — max 5MB</span>
                </div>
                <input type="file" id="fileInput" accept=".pdf,.docx" onchange="fileSelected(this)">
                <div class="file-selected" id="fileSelected">
                    ✅ <span id="fileName"></span>
                </div>
            </div>

            <div class="loading" id="loadingMsg">⏳ Submitting your application...</div>

            <button class="btn-submit" id="submitBtn" onclick="submitApplication()">
                Submit Application →
            </button>
        </div>

        <!-- Success State -->
        <div class="success-box" id="successBox">
            <div class="icon">🎉</div>
            <h3>Application Submitted!</h3>
            <p>Thank you for applying. Our team will review your resume and get back to you soon.</p>
            <br>
            <p style="color:#9ca3af; font-size:12px;">You can close this tab now.</p>
        </div>

    </div>
</div>

<script>
    const JD_FILENAME = "{{ filename }}";

    // Drag and drop
    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', e => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file) setFile(file);
    });

    function fileSelected(input) {
        if (input.files[0]) setFile(input.files[0]);
    }

    function setFile(file) {
        document.getElementById('fileName').textContent = file.name;
        document.getElementById('fileSelected').style.display = 'flex';
        // Store file in hidden input
        const dt = new DataTransfer();
        dt.items.add(file);
        document.getElementById('fileInput').files = dt.files;
    }

    async function submitApplication() {
        const name = document.getElementById('candidateName').value.trim();
        const email = document.getElementById('candidateEmail').value.trim();
        const fileInput = document.getElementById('fileInput');
        const errorMsg = document.getElementById('errorMsg');

        // Validate
        errorMsg.style.display = 'none';
        if (!name) return showError('Please enter your full name.');
        if (!email || !email.includes('@')) return showError('Please enter a valid email address.');
        if (!fileInput.files[0]) return showError('Please upload your resume.');

        // Disable button
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        document.getElementById('loadingMsg').style.display = 'block';

        // Build form data
        const formData = new FormData();
        formData.append('candidate_name', name);
        formData.append('candidate_email', email);
        formData.append('resume', fileInput.files[0]);
        formData.append('jd_filename', JD_FILENAME);

        try {
            const res = await fetch('/api/candidate-apply', {
                method: 'POST',
                body: formData
            });
            const data = await res.json();

            if (data.success) {
                document.getElementById('applicationForm').style.display = 'none';
                document.getElementById('successBox').style.display = 'block';
            } else {
                showError(data.error || 'Submission failed. Please try again.');
                btn.disabled = false;
            }
        } catch (e) {
            showError('Network error. Please try again.');
            btn.disabled = false;
        }

        document.getElementById('loadingMsg').style.display = 'none';
    }

    function showError(msg) {
        const el = document.getElementById('errorMsg');
        el.textContent = msg;
        el.style.display = 'block';
    }
</script>

</body>
</html>
